<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tafels Vliegveld" />
  <meta name="theme-color" content="#87ceeb" />
  <title>Tafels Vliegveld ✈️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sky">
    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="cloud cloud3">☁️</div>
  </div>

  <a href="index.html" class="home-link" title="Naar startpagina">🏠</a>

  <main class="app">
    <!-- Tafel kiezen -->
    <section id="menu" class="card">
      <header>
        <h1>✈️ Tafels Vliegveld</h1>
        <p class="subtitle">Kies een tafel om te oefenen</p>
      </header>
      <div id="tableButtons" class="table-grid"></div>
      <button id="mixBtn" class="big-btn mix">🎲 Door elkaar (1 t/m 10)</button>
      <a href="index.html" class="link-btn">⬅️ Terug naar startpagina</a>
    </section>

    <!-- Het spel -->
    <section id="game" class="card hidden">
      <div class="hud">
        <div class="hud-left">
          <button id="backBtn" class="hud-btn">⬅️ Tafel kiezen</button>
          <a href="index.html" class="hud-btn">🏠 Start</a>
        </div>
        <div class="hud-center">
          <span>Tafel van <strong id="currentTable">?</strong></span>
          <span class="hud-sep">|</span>
          <span>Score: <strong id="score">0</strong></span>
          <span class="hud-sep">|</span>
          <span>Vraag <strong id="questionNum">1</strong>/<strong id="totalQuestions">10</strong></span>
        </div>
        <div class="hud-right"></div>
      </div>

      <div class="scene" id="scene">
        <canvas id="canvas"></canvas>
      </div>

      <div id="feedback" class="feedback"></div>
    </section>

    <!-- Einde -->
    <section id="result" class="card hidden">
      <h2 id="resultTitle">🎉 Geweldig!</h2>
      <p id="resultText"></p>
      <div class="stars" id="stars"></div>
      <button id="againBtn" class="big-btn">Nog een keer 🔁</button>
      <button id="menuBtn" class="link-btn">⬅️ Andere tafel kiezen</button>
      <a href="index.html" class="link-btn">🏠 Naar startpagina</a>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
